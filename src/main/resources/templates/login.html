<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Gestión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .credentials-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
        }

        .credentials-info h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .credentials-info p {
            margin: 5px 0;
            color: #666;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>🏨 Hotel Gestión</h1>
        <p>Sistema de Asistencia y Reservas</p>
    </div>

    <div th:if="${param.error}" class="error-message">
        ❌ Correo o contraseña incorrectos
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">📧 Correo Electrónico</label>
            <input type="email" id="username" name="username"
                   placeholder="ejemplo@hotel.com" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">🔒 Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">Ingresar al Sistema</button>
    </form>

    <div class="credentials-info">
        <h3>Credenciales de Prueba:</h3>
        <p><strong>Admin:</strong> admin@hotel.com / admin123</p>
        <p><strong>Cliente:</strong> cliente@hotel.com / cliente123</p>
    </div>
</div>
</body>
</html>
