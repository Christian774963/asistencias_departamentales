<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes errIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(-45deg, #4338CA, #6D28D9, #7C3AED, #4F46E5);
            background-size: 400% 400%;
            animation: bgShift 8s ease infinite;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px 36px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 60px rgba(67,56,202,0.28), 0 8px 20px rgba(0,0,0,0.1);
            animation: cardIn 0.55s cubic-bezier(0.4,0,0.2,1) both;
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeDown 0.5s 0.1s both;
        }

        .brand-icon {
            width: 62px;
            height: 62px;
            border-radius: 16px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 20px rgba(79,70,229,0.38);
            animation: iconPulse 3s ease infinite;
        }
        .brand-icon span {
            font-size: 30px;
            color: white;
        }

        .login-header h1 {
            color: #1E1B4B;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .login-header p {
            color: #6B7280;
            font-size: 13px;
            font-weight: 500;
        }

        .error-message {
            display: none;
            align-items: center;
            gap: 8px;
            background: #FEF2F2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            animation: errIn 0.3s ease both;
        }
        .error-message.show {
            display: flex;
        }
        .error-message span {
            font-size: 18px;
            color: #DC2626;
        }

        .form-group {
            margin-bottom: 18px;
            animation: fadeDown 0.45s both;
        }
        .form-group:nth-child(1) { animation-delay: .18s; }
        .form-group:nth-child(2) { animation-delay: .26s; }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 7px;
            color: #374151;
            font-size: 13px;
            font-weight: 700;
        }
        .form-group label span {
            font-size: 17px;
            color: #6D28D9;
        }

        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #9CA3AF;
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-wrapper:focus-within .input-icon {
            color: #6D28D9;
        }

        .form-group input {
            width: 100%;
            padding: 11px 12px 11px 40px;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Nunito', sans-serif;
            color: #111827;
            background: #FAFAFA;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .form-group input::placeholder {
            color: #9CA3AF;
            font-weight: 400;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6D28D9;
            box-shadow: 0 0 0 3px rgba(109,40,217,0.12);
            background: white;
        }

        #password {
            padding-right: 42px;
        }

        .pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #9CA3AF;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: #6D28D9; }
        .pw-toggle span { font-size: 18px; }

        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 6px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeDown 0.45s 0.34s both;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,0.12) 50%, transparent 62%);
            background-size: 200% 100%;
            animation: shimmer 2.5s ease-in-out infinite;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(79,70,229,0.42);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login span { font-size: 19px; }

        .credentials-info {
            margin-top: 24px;
            padding: 16px;
            background: #F5F3FF;
            border: 1px solid #DDD6FE;
            border-radius: 12px;
            animation: fadeDown 0.45s 0.44s both;
        }
        .credentials-info h3 {
            font-size: 12px;
            font-weight: 700;
            color: #4C1D95;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .credentials-info h3 span { font-size: 15px; }

        .cred-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 8px;
            background: white;
            border: 1px solid #EDE9FE;
            margin-bottom: 6px;
            transition: border-color 0.15s;
        }
        .cred-row:last-child { margin-bottom: 0; }
        .cred-row:hover { border-color: #C4B5FD; }

        .cred-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 99px;
            flex-shrink: 0;
        }
        .cred-badge.admin  { background: #EDE9FE; color: #4C1D95; }
        .cred-badge.client { background: #E0F2FE; color: #075985; }

        .cred-text {
            font-size: 11px;
            font-weight: 600;
            color: #374151;
            font-family: monospace;
        }

        @media (max-width: 460px) {
            .login-container { padding: 32px 22px 28px; }
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="login-header">
        <div class="brand-icon">
            <span class="material-symbols-outlined">hotel</span>
        </div>
        <h1>Hotel Gestión</h1>
        <p>Sistema de asistencia y reservas</p>
    </div>

    <div th:if="${param.error}" class="error-message show">
        <span class="material-symbols-outlined">error</span>
        Correo o contraseña incorrectos
    </div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label for="username">
                <span class="material-symbols-outlined">mail</span>
                Correo electrónico
            </label>
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">mail</span>
                <input type="email"
                       id="username"
                       name="username"
                       placeholder="ejemplo@hotel.com"
                       required
                       autofocus
                       autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label for="password">
                <span class="material-symbols-outlined">lock</span>
                Contraseña
            </label>
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="••••••••"
                       required
                       autocomplete="current-password">
                <button type="button" class="pw-toggle" id="pwToggle" aria-label="Mostrar contraseña">
                    <span class="material-symbols-outlined" id="eyeIcon">visibility</span>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <span class="material-symbols-outlined">login</span>
            Ingresar al sistema
        </button>

    </form>


</div>

<script>
    const pwInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    document.getElementById('pwToggle').addEventListener('click', function () {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
        eyeIcon.textContent = isHidden ? 'visibility_off' : 'visibility';
    });
</script>

</body>
</html>
